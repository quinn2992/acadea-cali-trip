<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>California CS Visit Trip — April 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#0f1318; --surface:#161c24; --surface2:#1d2530; --border:#2a3340;
  --high:#e05252; --medium:#e8944a; --low:#4caf7d;
  --accent:#5b9bd5; --accent2:#7ec8e3;
  --text:#dde4ed; --muted:#7a8a9e; --faint:#3a4555;
  --drive:#c9a227;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:stretch;flex-shrink:0;}
.header-brand{display:flex;flex-direction:column;justify-content:center;padding:12px 0;margin-right:28px;}
.header-brand h1{font-family:'Libre Baskerville',serif;font-size:1.05rem;letter-spacing:-0.01em;}
.header-brand p{font-size:0.68rem;color:var(--muted);margin-top:3px;}
.tabs{display:flex;align-items:stretch;}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'IBM Plex Sans',sans-serif;font-size:0.78rem;font-weight:500;padding:0 18px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent2);}
.wip-badge{font-size:0.55rem;font-weight:600;letter-spacing:0.5px;background:var(--medium);color:#fff;padding:1px 5px;border-radius:3px;vertical-align:middle;margin-left:4px;}
.header-legend{margin-left:auto;display:flex;align-items:center;gap:16px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.7rem;color:var(--muted);font-weight:500;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.High{background:var(--high);box-shadow:0 0 4px var(--high);}
.dot.Medium{background:var(--medium);box-shadow:0 0 4px var(--medium);}
.dot.Low{background:var(--low);box-shadow:0 0 4px var(--low);}

/* TAB PANELS */
.tab-panel{display:none;flex:1;overflow:hidden;}
.tab-panel.active{display:flex;}

/* ── MAP TAB ── */
#tab-map{position:relative;}
#map{flex:1;height:100%;}
.map-sidebar{width:285px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;}
.map-sidebar::-webkit-scrollbar{width:3px;}
.map-sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.day-card{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;border-left:3px solid transparent;}
.day-card:hover{background:rgba(91,155,213,.05);}
.day-card.active{background:rgba(91,155,213,.08);border-left-color:var(--accent);}
.day-card-header{display:flex;align-items:baseline;gap:9px;margin-bottom:7px;}
.day-num{font-family:'Libre Baskerville',serif;font-size:1.4rem;color:var(--accent);line-height:1;min-width:24px;}
.day-meta h4{font-size:0.76rem;font-weight:600;color:var(--text);}
.day-meta p{font-size:0.66rem;color:var(--muted);margin-top:1px;}
.school-chips{display:flex;flex-direction:column;gap:3px;}
.chip{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;background:rgba(255,255,255,.03);font-size:0.68rem;color:var(--text);}
.chip-type{margin-left:auto;font-size:0.6rem;color:var(--muted);font-style:italic;white-space:nowrap;}

/* ── TABLE TAB ── */
#tab-table{flex-direction:column;overflow:hidden;}
.table-toolbar{padding:12px 22px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;}
.table-toolbar input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:0.76rem;padding:6px 11px;width:240px;outline:none;transition:border-color .15s;}
.table-toolbar input:focus{border-color:var(--accent);}
.table-toolbar input::placeholder{color:var(--faint);}
.filter-group{display:flex;gap:5px;}
.filter-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:'IBM Plex Sans',sans-serif;font-size:0.68rem;font-weight:500;padding:4px 11px;cursor:pointer;transition:all .12s;}
.filter-btn:hover{border-color:var(--accent);color:var(--text);}
.filter-btn.on-all{border-color:var(--accent);color:var(--accent);background:rgba(91,155,213,.08);}
.filter-btn.on-High{border-color:var(--high);color:var(--high);background:rgba(224,82,82,.08);}
.filter-btn.on-Medium{border-color:var(--medium);color:var(--medium);background:rgba(232,148,74,.08);}
.filter-btn.on-Low{border-color:var(--low);color:var(--low);background:rgba(76,175,125,.08);}
.table-count{margin-left:auto;font-size:0.7rem;color:var(--muted);}
.table-wrap{flex:1;overflow:auto;padding:0 22px 22px;}
.table-wrap::-webkit-scrollbar{width:4px;height:4px;}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
table{width:100%;border-collapse:collapse;margin-top:14px;font-size:0.76rem;}
thead tr{background:var(--surface);position:sticky;top:0;z-index:2;}
th{padding:9px 13px;text-align:left;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--text);}
th.sorted .sort-icon{opacity:1;color:var(--accent);}
.sort-icon{margin-left:4px;opacity:.3;}
td{padding:8px 13px;border-bottom:1px solid rgba(42,51,64,.5);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
.pri-badge{display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;font-weight:600;padding:2px 8px;border-radius:20px;}
.pri-badge.High{background:rgba(224,82,82,.15);color:var(--high);}
.pri-badge.Medium{background:rgba(232,148,74,.15);color:var(--medium);}
.pri-badge.Low{background:rgba(76,175,125,.15);color:var(--low);}
.day-badge{background:rgba(91,155,213,.12);color:var(--accent);font-size:0.65rem;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.not-scheduled{color:var(--faint);font-style:italic;font-size:0.68rem;}
.visit-note{font-size:0.65rem;color:var(--muted);}

/* ── ITINERARY TAB ── */
#tab-itinerary{overflow-y:auto;padding:28px 0;flex-direction:column;align-items:center;}
#tab-itinerary::-webkit-scrollbar{width:4px;}
#tab-itinerary::-webkit-scrollbar-thumb{background:var(--border);}
.itin-inner{width:100%;max-width:780px;padding:0 28px;}
.itin-intro{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:24px;}
.itin-intro h2{font-family:'Libre Baskerville',serif;font-size:1.15rem;color:var(--text);margin-bottom:8px;}
.itin-intro p{font-size:0.78rem;color:var(--muted);line-height:1.7;}
.itin-stats{display:flex;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.itin-stat{text-align:center;}
.itin-stat-num{font-family:'Libre Baskerville',serif;font-size:1.5rem;color:var(--accent2);}
.itin-stat-label{font-size:0.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-top:2px;}
.notice-box{background:rgba(201,162,39,.07);border:1px solid rgba(201,162,39,.25);border-radius:8px;padding:12px 18px;margin-bottom:20px;font-size:0.74rem;color:var(--drive);line-height:1.6;}
.notice-box strong{font-weight:600;}
.optional-box{background:rgba(232,148,74,.06);border:1px dashed rgba(232,148,74,.4);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.optional-header{background:rgba(232,148,74,.1);padding:10px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px dashed rgba(232,148,74,.3);}
.optional-badge{background:rgba(232,148,74,.2);color:var(--medium);font-size:0.65rem;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.optional-title{font-size:0.86rem;font-weight:600;color:var(--medium);}
.optional-subtitle{font-size:0.72rem;color:rgba(232,148,74,.7);margin-top:2px;}
.optional-note{padding:10px 20px 12px;font-size:0.72rem;color:rgba(232,148,74,.65);font-style:italic;line-height:1.6;}

/* Day block */
.day-block{margin-bottom:20px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.day-block-header{padding:14px 20px;background:var(--surface);display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--border);}
.day-block-num{font-family:'Libre Baskerville',serif;font-size:1.8rem;color:var(--accent);line-height:1;min-width:32px;}
.day-block-info h3{font-size:0.86rem;font-weight:600;color:var(--text);}
.day-block-info p{font-size:0.72rem;color:var(--muted);margin-top:2px;line-height:1.5;}

/* Timeline rows */
.timeline{padding:8px 0;}
.tl-row{display:grid;grid-template-columns:75px 1fr;align-items:start;padding:0 20px;}
.tl-row+.tl-row{margin-top:0;}

/* Meeting row */
.tl-row.meeting{padding-top:10px;padding-bottom:10px;}
.tl-row.meeting:not(:last-of-type){border-bottom:1px dashed rgba(42,51,64,.6);}
.tl-time{font-size:0.7rem;font-weight:600;color:var(--muted);padding-top:3px;white-space:nowrap;}
.tl-content{display:flex;flex-direction:column;gap:3px;}
.tl-name{font-size:0.8rem;font-weight:500;color:var(--text);}
.tl-name small{font-size:0.67rem;color:var(--muted);font-weight:400;margin-left:6px;}
.tl-meta{display:flex;align-items:center;gap:8px;}

/* Drive row */
.tl-row.drive{padding-top:6px;padding-bottom:6px;background:rgba(201,162,39,.04);}
.tl-row.drive .tl-time{color:var(--drive);font-size:0.65rem;}
.drive-info{display:flex;align-items:center;gap:8px;font-size:0.72rem;color:var(--drive);}
.drive-arrow{font-size:0.78rem;opacity:.7;}
.drive-detail{font-size:0.67rem;color:rgba(201,162,39,.6);}

/* Overnight row */
.tl-row.overnight{padding-top:8px;padding-bottom:10px;background:rgba(255,255,255,.02);}
.tl-row.overnight .tl-time{font-size:0.65rem;color:var(--faint);}
.overnight-info{font-size:0.72rem;color:var(--faint);font-style:italic;}

/* Popup */
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:8px!important;box-shadow:0 8px 24px rgba(0,0,0,.7)!important;color:var(--text)!important;}
.leaflet-popup-tip{background:var(--surface)!important;}
.leaflet-popup-close-button{color:var(--muted)!important;top:6px!important;right:8px!important;}
.popup-name{font-family:'Libre Baskerville',serif;font-size:.88rem;margin-bottom:5px;}
.popup-day{font-size:.68rem;color:var(--muted);margin-top:4px;}
</style>
</head>

    <p>April 14–18, 2025 &nbsp;·&nbsp; Arrive SFO &nbsp;·&nbsp; Depart LAX &nbsp;·&nbsp; Mon–Fri &nbsp;·&nbsp; <span style="color:var(--medium);">+ Optional Day 6 (Mon Apr 21)</span></p>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="table">📋&nbsp; Accounts</button>
    <button class="tab-btn" data-tab="itinerary">📅&nbsp; Itinerary <span class="wip-badge">WIP</span></button>
    <button class="tab-btn" data-tab="map">🗺&nbsp; Map <span class="wip-badge">WIP</span></button>
  </div>
  <div class="header-legend">
    <div class="legend-item"><div class="dot High"></div>High — EBR</div>

</header>

      <button class="filter-btn on-all" data-filter="all">All</button>

      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<div class="tab-panel" id="tab-itinerary">
  <div class="itin-inner" id="itin-inner"></div>
</div>

<div class="tab-panel" id="tab-map">
  <div id="map"></div>
  <div class="map-sidebar" id="map-sidebar"></div>
</div>

const map = L.map('map',{center:[36.5,-119.5],zoom:6});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{

}).addTo(map);

const PRICOLOR={High:'#e05252',Medium:'#e8944a',Low:'#4caf7d'};
const DAYCLR=['#5b9bd5','#bc8cff','#56d364','#f0883e','#ff7b72','#e8944a'];

function mkIcon(pri, optional){
  const c=optional?'#e8944a':PRICOLOR[pri],s=pri==='High'?13:pri==='Medium'?10:8;
  const border=optional?'rgba(232,148,74,.5)':'rgba(255,255,255,.6)';
  const dash=optional?`border:2px dashed ${border};`:`border:2px solid ${border};`;
  return L.divIcon({className:'',html:`<div style="width:${s}px;height:${s}px;background:${optional?'transparent':c};border-radius:50%;${dash}box-shadow:0 0 ${s}px ${c};"></div>`,iconSize:[s,s],iconAnchor:[s/2,s/2]});
}

DAYS.forEach((d,di)=>{
  const pts=[];
  d.timeline.filter(t=>t.type==='meeting').forEach(s=>{
    const m=L.marker([s.lat,s.lng],{icon:mkIcon(s.priority,d.optional)}).addTo(map);
    const optLabel=d.optional?' · <em style="color:var(--medium)">Optional</em>':'';
    m.bindPopup(`<div class="popup-name">${s.name}</div><span class="pri-badge ${s.priority}">${s.priority} Priority</span>${optLabel}<div class="popup-day">Day ${d.day} · ${d.date}</div><div style="font-size:.68rem;color:#7a8a9e;margin-top:3px;">${s.time} – ${s.endTime||''} · ${s.meeting}</div>`,{maxWidth:230});
    pts.push([s.lat,s.lng]);
  });
  const lineStyle=d.optional?{color:DAYCLR[di],weight:2,opacity:.5,dashArray:'4 6'}:{color:DAYCLR[di],weight:2.5,opacity:.65,dashArray:'5 4'};
  if(pts.length>1) L.polyline(pts,lineStyle).addTo(map);
});

let sortCol='day',sortDir=1,filterPri='all',searchTerm='';
function priOrd(p){return p==='High'?0:p==='Medium'?1:2;}

function renderTable(){
  let data=[...ALL_ACCOUNTS];
  if(filterPri!=='all') data=data.filter(r=>r.priority===filterPri);
  if(searchTerm) data=data.filter(r=>r.name.toLowerCase().includes(searchTerm.toLowerCase()));
  data.sort((a,b)=>{
    let av,bv;
    if(sortCol==='priority'){av=priOrd(a);bv=priOrd(b);}
    else if(sortCol==='day'){av=a.day??999;bv=b.day??999;}
    else{av=(a[sortCol]||'').toLowerCase();bv=(b[sortCol]||'').toLowerCase();}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  document.getElementById('table-count').textContent=`${data.length} of ${ALL_ACCOUNTS.length} accounts`;
  document.getElementById('table-body').innerHTML=data.map(r=>`<tr>
    <td>${r.name}</td>
    <td><span class="pri-badge ${r.priority}">${r.priority}</span></td>
    <td>${r.day?(r.optional?`<span class="day-badge" style="border:1px dashed rgba(232,148,74,.5);background:rgba(232,148,74,.08);color:var(--medium);">${r.dayLabel} ✦ Optional</span>`:`<span class="day-badge">${r.dayLabel}</span>`):`<span class="not-scheduled">Not scheduled</span>`}</td>
    <td><span class="visit-note">${r.meeting}</span></td>
    <td style="color:var(--muted);font-size:.72rem;">${r.region}</td>
    <td style="color:var(--muted);font-size:.72rem;">${r.tag||'—'}</td>
    <td style="color:var(--muted);font-size:.72rem;font-style:italic;">${r.note||''}</td>
  </tr>`).join('');
}

document.querySelectorAll('th[data-col]').forEach(th=>{
  th.addEventListener('click',()=>{
    if(sortCol===th.dataset.col) sortDir*=-1; else{sortCol=th.dataset.col;sortDir=1;}
    document.querySelectorAll('th').forEach(t=>{t.classList.remove('sorted');t.querySelector('.sort-icon').textContent='↕';});
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent=sortDir===1?'↑':'↓';
    renderTable();
  });
});

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    filterPri=btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b=>{b.className='filter-btn';});
    btn.classList.add(`on-${filterPri}`);
    renderTable();
  });
});

document.getElementById('search-input').addEventListener('input',e=>{searchTerm=e.target.value;renderTable();});
renderTable();
